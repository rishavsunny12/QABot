name: CI

on:
  push:
    branches: [main, "cursor/**", "oss-v1-release", "billing-usage-metering", "enterprise-sso-teams"]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: autoqa
          POSTGRES_PASSWORD: autoqa
          POSTGRES_DB: autoqa
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: |
          pip install -e ./backend[dev]
          pip install -e ./runner

      - name: Lint backend
        run: pip install ruff && ruff check backend runner

      - name: Run backend tests
        env:
          DATABASE_URL: postgresql+asyncpg://autoqa:autoqa@localhost:5432/autoqa
          REDIS_URL: redis://localhost:6379/0
          CREDENTIALS_ENCRYPTION_KEY: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
          ARTIFACTS_DIR: ./artifacts
        run: pytest backend/tests -v

      - name: Run runner tests
        run: pytest runner/tests -v

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Typecheck frontend
        working-directory: frontend
        run: npm run typecheck

  playwright:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Playwright
        run: |
          pip install playwright pytest
          pip install -e ./runner
          playwright install chromium

      - name: Run selector builder tests
        run: pytest runner/tests -v

      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-artifacts
          path: artifacts/
