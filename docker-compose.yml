services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-autoqa}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-autoqa}
      POSTGRES_DB: ${POSTGRES_DB:-autoqa}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-autoqa}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-autoqa}:${POSTGRES_PASSWORD:-autoqa}@postgres:5432/${POSTGRES_DB:-autoqa}
      REDIS_URL: redis://redis:6379/0
      ARTIFACTS_DIR: /app/artifacts
    volumes:
      - ./backend:/app/backend
      - ./runner:/app/runner
      - ./artifacts:/app/artifacts
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: celery -A app.tasks.celery_app worker --loglevel=info
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-autoqa}:${POSTGRES_PASSWORD:-autoqa}@postgres:5432/${POSTGRES_DB:-autoqa}
      REDIS_URL: redis://redis:6379/0
      ARTIFACTS_DIR: /app/artifacts
    volumes:
      - ./backend:/app/backend
      - ./runner:/app/runner
      - ./artifacts:/app/artifacts
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  beat:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: celery -A app.tasks.celery_app beat --loglevel=info
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-autoqa}:${POSTGRES_PASSWORD:-autoqa}@postgres:5432/${POSTGRES_DB:-autoqa}
      REDIS_URL: redis://redis:6379/0
      ARTIFACTS_DIR: /app/artifacts
    volumes:
      - ./backend:/app/backend
      - ./runner:/app/runner
      - ./artifacts:/app/artifacts
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend

  adminer:
    image: adminer:4
    ports:
      - "8080:8080"
    depends_on:
      - postgres

volumes:
  postgres_data:
